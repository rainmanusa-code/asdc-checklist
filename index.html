    { id:'strategy', section:'📋 Content Strategy', badge:'badge-purple', type:'infoblock',

      seo:`SEO targets: "adult dentist North Brunswick" and "general dentistry Middlesex County"`,
      social:`📌 Apr 1 — Article share: Did you know your mouth is a window into your overall health? Dr. Farida explains the link between gum disease and heart disease. Link in bio. 📌 Apr 7 — World Oral Health Day: People with gum disease are 2 to 3 times more likely to have a heart attack or stroke. Your cleaning is not just about your teeth. Tag ADA and ADHA for potential reshare. 📌 Apr 14: Gum disease has been linked to diabetes complications, premature birth, and Alzheimer disease. A preventive cleaning covered by insurance is one of the most important health appointments you can keep. 📌 Apr 21: Signs of gum disease most people ignore — bleeding when you brush, puffy or red gums, bad breath that does not go away. These are not normal. Call us: 732-633-2255.`,

      steps:[`a8s1:Write article by May 20`,`a8s2:Publish on alwayssmiledentalcare.com/articles first`,`a8s3:Submit to New Brunswick Today Jun 1 — lead outlet`,`a8s4:Submit to Patch 48hrs later`,`a8s5:Submit to TAPinto 48hrs after Patch`,`a8s6:Post article link to Google Business Profile`,`a8s7:Anniversary social content — team photos, community thank-you, milestones`] },
  ];

  let state = { checks: {}, notes: {}, taskOrder: null, lastUpdated: null };
  let saveTimer = null;
  let pinEntry = '';

  // ── PIN ──
  async function pinSubmit() {
    const hash = Array.from(new Uint8Array(
      await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pinEntry))
    )).map(b => b.toString(16).padStart(2,'0')).join('');
    const correctHash = Array.from(new Uint8Array(
      await crypto.subtle.digest('SHA-256', new TextEncoder().encode('0000'))
    )).map(b => b.toString(16).padStart(2,'0')).join('');

    if (hash === correctHash) {
      sessionStorage.setItem(PIN_SESSION_KEY, '1');
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadFromCloud();
    } else {
      document.getElementById('pinError').classList.add('show');
      document.querySelectorAll('.pin-dot').forEach(d => d.style.background = '#fca5a5');
      setTimeout(() => {
        pinEntry = ''; updateDots();
        document.getElementById('pinError').classList.remove('show');
        document.querySelectorAll('.pin-dot').forEach(d => d.style.background = '');
      }, 800);
    }
  }

  function pinPress(d) { if (pinEntry.length >= 4) return; pinEntry += d; updateDots(); if (pinEntry.length === 4) setTimeout(pinSubmit, 150); }
  function pinClear() { pinEntry = pinEntry.slice(0,-1); updateDots(); }
  function updateDots() { for (let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i < pinEntry.length); }

  // ── SYNC ──
  function setSyncStatus(msg, type) {
    document.getElementById('syncStatus').textContent = msg;
    document.getElementById('syncDot').className = 'sync-dot' + (type==='syncing'?' syncing':type==='error'?' error':'');
  }

  function updateLastUpdated(ts) {
    if (!ts) return;
    const el = document.getElementById('lastUpdated');
    if (!el) return;
    el.textContent = 'Last updated: ' + new Date(ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true}) + ' EST';
  }

  // ── CLOUD ──
  async function loadFromCloud() {
    setSyncStatus('Loading...','syncing');
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
      if (!res.ok) throw new Error();
      const data = await res.json();
      const d = (data.record||{}).asdc_checklist || {};
      state.checks = d.checks || {};
      state.notes = d.notes || {};
      state.taskOrder = d.taskOrder || null;
      state.lastUpdated = d.lastUpdated || null;
      // Apply saved task order (deletions)
      if (state.taskOrder) TASKS = TASKS.filter(t => state.taskOrder.includes(t.id));
      updateLastUpdated(state.lastUpdated);
      setSyncStatus('Synced','ok');
    } catch {
      setSyncStatus('Offline — changes save locally','error');
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) try { const p=JSON.parse(local); state=Object.assign(state,p); if(state.taskOrder) TASKS=TASKS.filter(t=>state.taskOrder.includes(t.id)); } catch {}
    }
    render();
  }

  async function saveToCloud() {
    setSyncStatus('Saving...','syncing');
    state.lastUpdated = new Date().toISOString();
    state.taskOrder = TASKS.map(t=>t.id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    updateLastUpdated(state.lastUpdated);
    try {
      const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
      const cur = getRes.ok ? await getRes.json() : {record:{}};
      const merged = Object.assign({}, cur.record||{}, {
        asdc_checklist: { checks:state.checks, notes:state.notes, taskOrder:state.taskOrder, lastUpdated:state.lastUpdated }
      });
      const put = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
        method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':API_KEY}, body:JSON.stringify(merged)
      });
      if (!put.ok) throw new Error();
      setSyncStatus('Saved ✓','ok');
    } catch { setSyncStatus('Saved locally (cloud unavailable)','error'); }
  }

  function queueSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToCloud, 1200); }

  // ── RENDER ──
  // Section → group mapping
  const WEBSITE_SECTIONS = new Set([
    '🔴 Critical — Fix Before Op-Ed Goes Live',
    '🟡 Important — Fix Soon',
    '🟢 Nice to Have — When Time Allows'
  ]);
  const CONTENT_SECTIONS = new Set([
    '📋 Content Strategy',
    '📅 Content Schedule — 2026–2027'
  ]);

  function render() {
    const container = document.getElementById('taskList');
    container.innerHTML = '';
    let currentSection = '';
    let currentGroup = '';
    let card = null;
    let globalNum = 0;

    TASKS.forEach(task => {
      // Determine which top-level group this task belongs to
      const group = WEBSITE_SECTIONS.has(task.section) ? 'website' : 'content';

      // Inject group header when group changes
      if (group !== currentGroup) {
        currentGroup = group;
        const groupDiv = document.createElement('div');
        groupDiv.style.cssText = 'margin:32px 0 20px';
        if (group === 'website') {
          groupDiv.innerHTML = `<div style="display:flex;align-items:center;gap:12px"><div style="flex:1;height:2px;background:#E5E7EB"></div><span style="font-size:13px;font-weight:700;color:#374151;background:#F9FAFB;border:1.5px solid #E5E7EB;padding:6px 18px;border-radius:20px;white-space:nowrap">🌐 SECTION 1 — Website Updates</span><div style="flex:1;height:2px;background:#E5E7EB"></div></div>`;
        } else {
          groupDiv.innerHTML = `<div style="display:flex;align-items:center;gap:12px"><div style="flex:1;height:2px;background:#E5E7EB"></div><span style="font-size:13px;font-weight:700;color:#374151;background:#F9FAFB;border:1.5px solid #E5E7EB;padding:6px 18px;border-radius:20px;white-space:nowrap">📅 SECTION 2 — Content Schedule 2026–2027</span><div style="flex:1;height:2px;background:#E5E7EB"></div></div>`;
        }
        container.appendChild(groupDiv);
        currentSection = ''; // reset so section header re-renders
      }

      if (task.section !== currentSection) {
        currentSection = task.section;
        const sec = document.createElement('div');
        sec.className = 'section';
        const hdr = document.createElement('div');
        hdr.className = 'section-header';
        hdr.innerHTML = `<span class="priority-badge ${task.badge}">${task.section}</span>`;
        sec.appendChild(hdr);
        card = document.createElement('div');
        card.className = 'card';
        sec.appendChild(card);
        container.appendChild(sec);
      }
      globalNum++;
      const checked = !!state.checks[task.id];
      const noteVal = state.notes[task.id] || '';

      if (task.type === 'infoblock') {
        // ── STYLED INFO BOX — no checkbox, just content ──
        const item = document.createElement('div');
        item.dataset.id = task.id;
        item.style.cssText = 'background:#F5F3FF;border:1.5px solid #DDD6FE;border-radius:12px;padding:22px 26px;margin-bottom:0';
        item.innerHTML = task.content;
        card.appendChild(item);

      } else if (task.type === 'article') {
        // ── ARTICLE CARD with sub-checklist ──
        const allDone = task.steps && task.steps.every(s => !!state.checks[s.split(':')[0]]);
        const doneCount = task.steps ? task.steps.filter(s => !!state.checks[s.split(':')[0]]).length : 0;
        const item = document.createElement('div');
        item.className = 'item' + (allDone ? ' done' : '');
        item.dataset.id = task.id;
        item.style.cssText = 'flex-direction:column;cursor:default';
        item.innerHTML = `
          <div style="display:flex;align-items:flex-start;gap:16px;width:100%">
            <div style="flex:1;min-width:0">
              <div class="item-header" style="margin-bottom:8px">
                <span class="item-number">Article ${task.num}</span>
                <span style="font-size:12px;font-weight:700;color:#7C3AED;background:#EDE9FE;padding:2px 10px;border-radius:20px">${task.date}</span>
                <span class="page-tag">${task.tag}</span>
              </div>
              <div class="item-title" style="margin-bottom:6px">${task.title}</div>
              <div class="item-desc" style="margin-bottom:6px">${task.desc}</div>
              <div style="font-size:12px;color:#6B7280;font-style:italic;margin-bottom:8px">${task.seo}</div>
              ${task.social ? `<div style="background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:8px;padding:10px 14px;margin-bottom:12px"><span style="font-size:11px;font-weight:700;color:#065F46;display:block;margin-bottom:4px">📱 SOCIAL</span><span style="font-size:13px;color:#374151">${task.social}</span></div>` : ''}
              <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:8px">DEADLINE: <span style="color:#B91C1C">${task.deadline}</span> &nbsp;·&nbsp; ${doneCount} of ${task.steps.length} steps complete</div>
              <div style="display:flex;flex-direction:column;gap:6px">
                ${task.steps.map(s => {
                  const [sid, ...lp] = s.split(':');
                  const label = lp.join(':');
                  const chk = !!state.checks[sid];
                  return `<div onclick="toggleStep('${sid}')" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:${chk?'#F0FDF4':'#F9FAFB'};border:1.5px solid ${chk?'#BBF7D0':'#E5E7EB'};border-radius:8px;cursor:pointer">
                    <div style="width:20px;height:20px;border-radius:6px;border:2px solid ${chk?'#16A34A':'#D1D5DB'};background:${chk?'#16A34A':'white'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
                      ${chk ? '<svg width="11" height="9" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
                    </div>
                    <span style="font-size:13px;color:${chk?'#6B7280':'#111'};${chk?'text-decoration:line-through':''};line-height:1.4">${label}</span>
                  </div>`;
                }).join('')}
              </div>
              <span class="note-label" style="margin-top:12px">Notes</span>
              <textarea class="note-area" placeholder="Add a note..." onclick="event.stopPropagation()" oninput="saveNote('${task.id}', this.value)">${noteVal}</textarea>
            </div>
            <button class="delete-btn" onclick="deleteTask('${task.id}')" title="Delete" style="flex-shrink:0;position:relative;top:0;right:0;opacity:0.5">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>`;
        card.appendChild(item);

      } else {
        // ── STANDARD TASK ──
        const item = document.createElement('div');
        item.className = 'item' + (checked ? ' done' : '');
        item.dataset.id = task.id;
      item.innerHTML = `
        <div class="checkbox" onclick="toggleItem('${task.id}')">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="item-body">
          <div class="item-header">
            <span class="item-number">${String(globalNum).padStart(2,'0')}</span>
            <span class="item-title">${task.title}</span>
            <span class="page-tag">${task.tag}</span>
          </div>
          <div class="item-desc">${task.desc}</div>
          <div class="done-stamp">✓ Completed</div>
          <span class="note-label">Notes</span>
          <textarea class="note-area" placeholder="Add a note..." onclick="event.stopPropagation()" oninput="saveNote('${task.id}', this.value)">${noteVal}</textarea>
        </div>
        <button class="delete-btn" onclick="deleteTask('${task.id}')" title="Delete task">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/></svg>
        </button>`;
      card.appendChild(item);
      } // end else standard task
    });

    updateProgress();
  }

  function toggleStep(sid) {
    state.checks[sid] = !state.checks[sid];
    render();
    queueSave();
  }

  // ── ACTIONS ──
  function toggleItem(id) {
    state.checks[id] = !state.checks[id];
    render();
    queueSave();
  }

  function saveNote(id, val) {
    state.notes[id] = val;
    queueSave();
  }

  function deleteTask(id) {
    const task = TASKS.find(t => t.id === id);
    if (!confirm(`Delete task: "${task ? task.title : id}"?\n\nThis cannot be undone.`)) return;
    TASKS = TASKS.filter(t => t.id !== id);
    delete state.checks[id];
    delete state.notes[id];
    render();
    queueSave();
  }

  function updateProgress() {
    let total = 0, done = 0;
    TASKS.forEach(task => {
      if (task.type === 'infoblock') return;
      if (task.type === 'article') {
        task.steps.forEach(s => {
          const sid = s.split(':')[0];
          total++;
          if (state.checks[sid]) done++;
        });
      } else {
        total++;
        if (state.checks[task.id]) done++;
      }
    });
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' of ' + total + ' complete';
    document.getElementById('summaryText').textContent = done;
    document.getElementById('summaryTotal').textContent = total;
    document.getElementById('allDoneBanner').classList.toggle('show', total > 0 && done === total);
  }

  async function resetAll() {
    if (!confirm('Reset all checkboxes and notes for everyone? This cannot be undone.')) return;
    state.checks = {}; state.notes = {};
    render();
    await saveToCloud();
  }

  // ── INIT ──
  window.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem(PIN_SESSION_KEY) === '1') {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadFromCloud();
    }
    setInterval(() => { if (sessionStorage.getItem(PIN_SESSION_KEY)==='1') loadFromCloud(); }, 30000);
  });
</script>
