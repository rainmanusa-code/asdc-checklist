      setTimeout(() => {
        pinEntry = ''; updateDots();
        document.getElementById('pinError').classList.remove('show');
        document.querySelectorAll('.pin-dot').forEach(d => d.style.background = '');
      }, 800);
    }
  }

  function pinPress(d) { if (pinEntry.length >= 4) return; pinEntry += d; updateDots(); if (pinEntry.length === 4) setTimeout(pinSubmit, 150); }
  function pinClear() { pinEntry = pinEntry.slice(0,-1); updateDots(); }
  function updateDots() { for (let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i < pinEntry.length); }

  // ── SYNC ──
  function setSyncStatus(msg, type) {
    document.getElementById('syncStatus').textContent = msg;
    document.getElementById('syncDot').className = 'sync-dot' + (type==='syncing'?' syncing':type==='error'?' error':'');
  }

  function updateLastUpdated(ts) {
    if (!ts) return;
    const el = document.getElementById('lastUpdated');
    if (!el) return;
    el.textContent = 'Last updated: ' + new Date(ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true}) + ' EST';
  }

  // ── CLOUD ──
  async function loadFromCloud() {
    setSyncStatus('Loading...','syncing');
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
      if (!res.ok) throw new Error();
      const data = await res.json();
      const d = (data.record||{}).asdc_checklist || {};
      state.checks = d.checks || {};
      state.notes = d.notes || {};
      state.taskOrder = d.taskOrder || null;
      state.lastUpdated = d.lastUpdated || null;
      // Apply saved task order (deletions)
      if (state.taskOrder) TASKS = TASKS.filter(t => state.taskOrder.includes(t.id));
      updateLastUpdated(state.lastUpdated);
      setSyncStatus('Synced','ok');
    } catch {
      setSyncStatus('Offline — changes save locally','error');
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) try { const p=JSON.parse(local); state=Object.assign(state,p); if(state.taskOrder) TASKS=TASKS.filter(t=>state.taskOrder.includes(t.id)); } catch {}
    }
    render();
  }

  async function saveToCloud() {
    setSyncStatus('Saving...','syncing');
    state.lastUpdated = new Date().toISOString();
    state.taskOrder = TASKS.map(t=>t.id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    updateLastUpdated(state.lastUpdated);
    try {
      const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
      const cur = getRes.ok ? await getRes.json() : {record:{}};
      const merged = Object.assign({}, cur.record||{}, {
        asdc_checklist: { checks:state.checks, notes:state.notes, taskOrder:state.taskOrder, lastUpdated:state.lastUpdated }
      });
      const put = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
        method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':API_KEY}, body:JSON.stringify(merged)
      });
      if (!put.ok) throw new Error();
      setSyncStatus('Saved ✓','ok');
    } catch { setSyncStatus('Saved locally (cloud unavailable)','error'); }
  }

  function queueSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToCloud, 1200); }

  // ── RENDER ──
  function render() {
    const container = document.getElementById('taskList');
    container.innerHTML = '';
    let currentSection = '';
    let card = null;
    let globalNum = 0;

    TASKS.forEach(task => {
      if (task.section !== currentSection) {
        currentSection = task.section;
        const sec = document.createElement('div');
        sec.className = 'section';
        const hdr = document.createElement('div');
        hdr.className = 'section-header';
        hdr.innerHTML = `<span class="priority-badge ${task.badge}">${task.section}</span>`;
        sec.appendChild(hdr);
        card = document.createElement('div');
        card.className = 'card';
        sec.appendChild(card);
        container.appendChild(sec);
      }
      globalNum++;
      const checked = !!state.checks[task.id];
      const noteVal = state.notes[task.id] || '';

      const item = document.createElement('div');
      item.className = 'item' + (checked ? ' done' : '');
      item.dataset.id = task.id;
      item.innerHTML = `
        <div class="checkbox" onclick="toggleItem('${task.id}')">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="item-body">
          <div class="item-header">
            <span class="item-number">${String(globalNum).padStart(2,'0')}</span>
            <span class="item-title">${task.title}</span>
            <span class="page-tag">${task.tag}</span>
          </div>
          <div class="item-desc">${task.desc}</div>
          <div class="done-stamp">✓ Completed</div>
          <span class="note-label">Notes</span>
          <textarea class="note-area" placeholder="Add a note..." onclick="event.stopPropagation()" oninput="saveNote('${task.id}', this.value)">${noteVal}</textarea>
        </div>
        <button class="delete-btn" onclick="deleteTask('${task.id}')" title="Delete task">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/></svg>
        </button>`;
      card.appendChild(item);
    });

    updateProgress();
  }

  // ── ACTIONS ──
  function toggleItem(id) {
    state.checks[id] = !state.checks[id];
    render();
    queueSave();
  }

  function saveNote(id, val) {
    state.notes[id] = val;
    queueSave();
  }

  function deleteTask(id) {
    const task = TASKS.find(t => t.id === id);
    if (!confirm(`Delete task: "${task ? task.title : id}"?\n\nThis cannot be undone.`)) return;
    TASKS = TASKS.filter(t => t.id !== id);
    delete state.checks[id];
    delete state.notes[id];
    render();
    queueSave();
  }

  function updateProgress() {
    const total = TASKS.length;
    const done = TASKS.filter(t => state.checks[t.id]).length;
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' of ' + total + ' complete';
    document.getElementById('summaryText').textContent = done;
    document.getElementById('summaryTotal').textContent = total;
    document.getElementById('allDoneBanner').classList.toggle('show', total > 0 && done === total);
  }

  async function resetAll() {
    if (!confirm('Reset all checkboxes and notes for everyone? This cannot be undone.')) return;
    state.checks = {}; state.notes = {};
    render();
    await saveToCloud();
  }

  // ── INIT ──
  window.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem(PIN_SESSION_KEY) === '1') {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadFromCloud();
    }
    setInterval(() => { if (sessionStorage.getItem(PIN_SESSION_KEY)==='1') loadFromCloud(); }, 30000);
  });
</script>
</body>
</html>
