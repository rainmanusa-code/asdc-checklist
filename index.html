<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Always Smile Dental Care — ATG</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFC;color:#111;font-size:15px;min-height:100vh}

  /* ── PIN ── */
  #pinScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#1A5276 0%,#2E86C1 100%)}
  #pinScreen h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px}
  #pinScreen p{font-size:14px;color:#AED6F1;margin-bottom:28px}
  .pin-dots{display:flex;gap:14px;margin-bottom:28px}
  .pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);transition:all 0.15s}
  .pin-dot.filled{background:white;border-color:white}
  .pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
  .pin-btn{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;font-size:22px;font-weight:500;cursor:pointer;transition:all 0.15s}
  .pin-btn:hover{background:rgba(255,255,255,0.25)}
  .pin-btn:active{transform:scale(0.93)}
  #pinError{color:#fca5a5;font-size:13px;margin-top:14px;display:none}
  #pinError.show{display:block}

  /* ── APP ── */
  #app{display:none;min-height:100vh;flex-direction:column}

  /* ── HEADER ── */
  .header{background:linear-gradient(135deg,#1A5276 0%,#2E86C1 100%);padding:24px 24px 0;color:white;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
  .header-top{max-width:960px;margin:0 auto}
  .header h1{font-size:20px;font-weight:700;margin-bottom:2px}
  .header-sub{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .header-sub p{font-size:13px;color:#AED6F1}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
  .sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
  .sync-dot.error{background:#ef4444}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .sync-status{font-size:11px;color:rgba(255,255,255,0.6)}
  #lastUpdated{font-size:11px;color:rgba(255,255,255,0.4)}

  /* ── TABS ── */
  .tabs{display:flex;gap:4px;max-width:960px;margin:0 auto;overflow-x:auto;padding-bottom:0}
  .tabs::-webkit-scrollbar{display:none}
  .tab{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px 10px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,0.65);background:rgba(255,255,255,0.08);border:none;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
  .tab:hover{background:rgba(255,255,255,0.15);color:white}
  .tab.active{background:white;color:#1A5276}
  .tab-pill{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,0.2);color:white}
  .tab.active .tab-pill{background:#EEF2FF;color:#1A5276}
  .tab-pill.complete{background:#16A34A;color:white}
  .tab.active .tab-pill.complete{background:#16A34A;color:white}

  /* ── CONTENT AREA ── */
  .content{max-width:960px;margin:0 auto;padding:24px 20px 80px}
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  /* ── DASHBOARD ── */
  .dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
  .dash-card{background:white;border:1.5px solid #E5E7EB;border-radius:14px;padding:24px 22px;cursor:pointer;transition:all 0.2s}
  .dash-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateY(-2px)}
  .dash-card-icon{font-size:32px;margin-bottom:12px}
  .dash-card-title{font-size:17px;font-weight:700;color:#111;margin-bottom:6px}
  .dash-card-progress{font-size:13px;color:#6B7280;margin-bottom:8px}
  .dash-bar-bg{background:#F3F4F6;border-radius:6px;height:6px;overflow:hidden}
  .dash-bar-fill{height:100%;border-radius:6px;transition:width 0.5s ease}
  .next-task{background:#F8FAFC;border:1.5px solid #E5E7EB;border-radius:10px;padding:14px 18px;margin-top:6px;font-size:12px;color:#374151;line-height:1.4}
  .next-task-label{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}

  /* ── SECTION HEADER ── */
  .section{margin-bottom:24px}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .priority-badge{font-size:12px;font-weight:700;letter-spacing:0.4px;padding:4px 12px;border-radius:20px;text-transform:uppercase}
  .badge-red{background:#FEE2E2;color:#B91C1C}
  .badge-amber{background:#FEF3C7;color:#92400E}
  .badge-green{background:#D1FAE5;color:#065F46}
  .badge-blue{background:#DBEAFE;color:#1E40AF}
  .badge-purple{background:#EDE9FE;color:#5B21B6}
  .badge-seo{background:#FEF3C7;color:#92400E}

  /* ── CARDS ── */
  .card{background:white;border:1.5px solid #E5E7EB;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05)}

  /* ── ITEMS ── */
  .item{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border-bottom:1.5px solid #F3F4F6;transition:background 0.15s;position:relative}
  .item:last-child{border-bottom:none}
  .item:hover{background:#FAFAFA}
  .item.done{background:#F0FDF4;padding:11px 18px}
  .item.done .item-title{text-decoration:line-through;color:#9CA3AF;font-size:14px}

  .checkbox{width:24px;height:24px;border-radius:7px;border:2px solid #D1D5DB;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.2s;background:white;cursor:pointer}
  .item.done .checkbox{background:#16A34A;border-color:#16A34A}
  .checkbox svg{display:none}
  .item.done .checkbox svg{display:block}

  .item-body{flex:1;min-width:0}
  .item-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .item-number{font-size:11px;font-weight:700;color:#6B7280;background:#F3F4F6;padding:2px 7px;border-radius:10px}
  .item-title{font-size:15px;font-weight:600;color:#111;line-height:1.4}
  .page-tag{font-size:11px;font-weight:600;color:#1D4ED8;background:#DBEAFE;padding:2px 8px;border-radius:8px}
  .item-desc{font-size:14px;color:#374151;line-height:1.6;margin-bottom:10px}
  .done-stamp{font-size:11px;color:#16A34A;font-weight:600;margin-top:1px}
  .note-label{font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:4px;margin-top:10px}
  .note-area{width:100%;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:7px;color:#111;font-size:13px;font-family:inherit;padding:8px 12px;resize:vertical;min-height:54px;transition:border-color 0.2s;line-height:1.5}
  .note-area:focus{outline:none;border-color:#2E86C1;background:#fff}
  .note-area::placeholder{color:#9CA3AF}

  .delete-btn{position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.2s;color:#EF4444}
  .item:hover .delete-btn{opacity:1}
  .delete-btn:hover{background:#FEE2E2}

  /* ── ARTICLE CARD ── */
  .article-item{flex-direction:column;cursor:default}
  .article-item:hover{background:white}
  .sub-step{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1.5px solid #E5E7EB;border-radius:8px;cursor:pointer;transition:all 0.15s;margin-bottom:6px}
  .sub-step:hover{background:#F9FAFB}
  .sub-step.done{background:#F0FDF4;border-color:#BBF7D0}
  .sub-step-check{width:20px;height:20px;border-radius:6px;border:2px solid #D1D5DB;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
  .sub-step.done .sub-step-check{background:#16A34A;border-color:#16A34A}
  .sub-step-label{font-size:13px;color:#111;line-height:1.4}
  .sub-step.done .sub-step-label{text-decoration:line-through;color:#6B7280}
  .social-box{background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:8px;padding:12px 14px;margin-bottom:12px}
  .social-label{font-size:11px;font-weight:700;color:#065F46;display:block;margin-bottom:5px}
  .social-text{font-size:13px;color:#374151;line-height:1.6}

  /* ── INFO BLOCK ── */
  .info-block{background:#F5F3FF;border:1.5px solid #DDD6FE;border-radius:12px;padding:22px 26px}

  /* ── JUMP BTN ── */
  .jump-btn{display:inline-flex;align-items:center;gap:6px;background:#1A5276;color:white;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;transition:background 0.2s}
  .jump-btn:hover{background:#2E86C1}

  /* ── BOTTOM BAR ── */
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid #E5E7EB;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 16px rgba(0,0,0,0.07);z-index:100}
  .bottom-left{font-size:14px;color:#374151}
  .bottom-left strong{color:#1A5276;font-size:15px}
  .reset-btn{font-size:12px;color:#6B7280;background:none;border:1.5px solid #E5E7EB;padding:7px 16px;border-radius:20px;cursor:pointer}
  .reset-btn:hover{border-color:#EF4444;color:#EF4444}

  .all-done{display:none;background:linear-gradient(135deg,#15803D,#16A34A);color:white;text-align:center;padding:18px;border-radius:12px;font-size:16px;font-weight:600;margin-bottom:20px}
  .all-done.show{display:block}
</style>
</head>
<body>

<!-- PIN -->
<div id="pinScreen">
  <h2>🦷 Always Smile — ATG</h2>
  <p>Enter PIN to continue</p>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinClear()" style="font-size:14px">⌫</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" style="opacity:0;pointer-events:none"></button>
  </div>
  <div id="pinError">Incorrect PIN. Try again.</div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <h1>🦷 Always Smile Dental Care — ATG</h1>
      <div class="header-sub">
        <div class="sync-dot" id="syncDot"></div>
        <span class="sync-status" id="syncStatus">Loading...</span>
        <span style="color:rgba(255,255,255,0.3)">·</span>
        <span id="lastUpdated"></span>
      </div>
    </div>
    <div class="tabs" id="tabBar">
      <button class="tab active" onclick="switchTab('dashboard')" id="tab-dashboard">
        📊 Overview
      </button>
      <button class="tab" onclick="switchTab('website')" id="tab-website">
        🌐 Website
        <span class="tab-pill" id="pill-website">0/14</span>
      </button>
      <button class="tab" onclick="switchTab('seo')" id="tab-seo">
        🔍 SEO
        <span class="tab-pill" id="pill-seo">0/19</span>
      </button>
      <button class="tab" onclick="switchTab('content')" id="tab-content">
        📅 Content
        <span class="tab-pill" id="pill-content">0/0</span>
      </button>
    </div>
  </div>

  <div class="content">

    <!-- DASHBOARD TAB -->
    <div class="tab-panel active" id="panel-dashboard">
      <div class="all-done" id="allDoneBanner">✅ Everything complete — great work!</div>
      <div id="overallProgress" style="background:white;border:1.5px solid #E5E7EB;border-radius:14px;padding:20px 24px;margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:16px;font-weight:700;color:#111">Overall Progress</span>
          <span id="overallLabel" style="font-size:14px;font-weight:600;color:#6B7280">0 of 0 complete</span>
        </div>
        <div style="background:#F3F4F6;border-radius:8px;height:12px;overflow:hidden">
          <div id="overallBar" style="height:100%;border-radius:8px;background:linear-gradient(90deg,#1A5276,#2E86C1);transition:width 0.5s ease;width:0%"></div>
        </div>
      </div>
      <div class="dashboard-grid" id="dashGrid"></div>
    </div>

    <!-- WEBSITE TAB -->
    <div class="tab-panel" id="panel-website">
      <button class="jump-btn" onclick="jumpToNext('website')">⬇ Jump to next task</button>
      <div id="render-website"></div>
    </div>

    <!-- SEO TAB -->
    <div class="tab-panel" id="panel-seo">
      <button class="jump-btn" onclick="jumpToNext('seo')">⬇ Jump to next task</button>
      <div id="render-seo"></div>
    </div>

    <!-- CONTENT TAB -->
    <div class="tab-panel" id="panel-content">
      <div id="render-content"></div>
    </div>

  </div>

  <div class="bottom-bar">
    <div class="bottom-left"><strong id="totalDone">0</strong> of <strong id="totalAll">0</strong> tasks complete across all sections</div>
    <button class="reset-btn" onclick="resetAll()">Reset All</button>
  </div>
</div>

<script>
  // ── CONFIG ──
  const BIN_ID = '6a3ca67eda38895dfefb0c07';
  const API_KEY = '$2a$10$4aH/RKWn7NmW7cwBiDm09OBT4bHwMecicfSywrrHQ1cjssRzCA1IO';
  const STORAGE_KEY = 'asdc_checklist_v4';
  const PIN_KEY = 'asdc_pin_ok';

  let TASKS = [
    // ── WEBSITE FIX TASKS ──
    { id:'t1', section:'🔴 Critical — Fix Before Op-Ed Goes Live', badge:'badge-red', title:'Fix all 5 FAQ answers on About Us page', tag:'About Us', desc:'Every FAQ shows the same wrong answer: "Yes, we accept most major dental insurance plans." Each needs its own correct answer: What services do you offer? How often should I visit? What can I expect on my first visit? Do you offer emergency care?' },
    { id:'t2', section:'🔴 Critical — Fix Before Op-Ed Goes Live', badge:'badge-red', title:'Add NJ Medicaid / NJ FamilyCare to the insurance section', tag:'Homepage', desc:'Insurance logos show Aetna, Blue Cross, Cigna, Delta, Guardian, Humana, MetLife — but NJ Medicaid is missing. The op-ed states the practice accepts NJ Medicaid. Add NJ FamilyCare before the article goes live.' },
    { id:'t3', section:'🔴 Critical — Fix Before Op-Ed Goes Live', badge:'badge-red', title:'Fix New Patient Special price — $109 vs $129 vs $129.99', tag:'Homepage', desc:'Three different prices appear for the same offer: hero section shows $109, pricing cards show $129, the booking form shows $129.99. Pick one and apply consistently across every page.' },
    { id:'t4', section:'🔴 Critical — Fix Before Op-Ed Goes Live', badge:'badge-red', title:'Publish the op-ed under the Articles section', tag:'Articles', desc:'The op-ed must be published on alwayssmiledentalcare.com/articles/ BEFORE submitting to any newspaper. This establishes the canonical URL and gives newspapers a live link to reference.' },
    { id:'t5', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Add NYU College of Dentistry credential to Dr. Farida bio', tag:'Homepage · About Us', desc:'The bio mentions "over 10 years of experience" but never mentions NYU. A reviewer wrote: "I came across a Dr. who had graduated from NYU, and I knew that I will not be wrong." Add the NYU credential prominently.' },
    { id:'t6', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Ensure Negative Review is not seen on Website', tag:'Homepage · About Us', desc:'The 1-star review from "S A" is visible in the testimonials section. Check the Trustindex / Google Reviews widget settings to filter reviews below a minimum star rating. It stays on Google — but should not appear on your own website.' },
    { id:'t7', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Remove "dental practices throughout the world" from About Us', tag:'About Us', desc:'The About Us intro includes leftover template copy: "With dental practices throughout the world." Always Smile Dental Care is one practice in North Brunswick, NJ. Remove or replace this sentence.' },
    { id:'t8', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Fix "Franklin Towship" typo in footer', tag:'All Pages — Footer', desc:'The footer lists "Franklin Towship" — missing the n. Should read "Franklin Township." Appears in both the community links list and footer neighborhood section on all pages.' },
    { id:'t9', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Fix Wednesday missing from appointment booking form', tag:'Homepage · Booking Form', desc:'Hours show Tuesday, Wednesday, Friday, Saturday but the booking form only lists Tuesday, Friday, Saturday. Either add Wednesday to the form or remove it from the hours display.' },
    { id:'t10', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Fix "Guranteed" typo on pricing card', tag:'Homepage', desc:'The Free Second Opinion pricing card reads "Guranteed discount." Fix the spelling to "Guaranteed" in both the card headline and the bullet point below it.' },
    { id:'t11', section:'🟢 Nice to Have — When Time Allows', badge:'badge-green', title:'Update "hundreds of families" to reflect true scale', tag:'Homepage · About Us', desc:'The bio says "hundreds of families." With 143 Google reviews and a fully booked schedule the practice has seen thousands of patients. Update to reflect the true scale.' },
    { id:'t12', section:'🟢 Nice to Have — When Time Allows', badge:'badge-green', title:'Update hours when GP associate is hired and new days open', tag:'Homepage · All Pages', desc:'Once a GP associate is hired and the practice expands, update hours on the homepage, contact page, Google Business Profile, and all directory listings simultaneously.' },
    { id:'t13', section:'🟢 Nice to Have — When Time Allows', badge:'badge-green', title:'Personalize the About Us mission and vision text', tag:'About Us', desc:'Current mission and vision are generic template language. Rewrite to reflect the practice values — accessible care for all insurance types, serving the diverse Middlesex County community, dental care for all ages.' },
    { id:'t14', section:'🟢 Nice to Have — When Time Allows', badge:'badge-green', title:'Create individual bio pages for all team members — doctors, office manager, and assistants', tag:'About Us · Team', desc:'Add a dedicated team page or individual bio sections for Dr. Fanuswala and every team member: office manager, dental assistants, and any other staff. Include a professional photo for each person. This builds patient trust before they walk in, improves Google People Also Search rankings, and differentiates the practice from corporate DSOs. Each bio should include: name, role, a short personal paragraph, and a photo. Team photos can be taken in-office with a smartphone — no professional photographer required to start.' },

    // ── SECTION 3: SEO FOUNDATION ──
    { id:'s1', section:'⭐ Google Business Profile', badge:'badge-seo', title:'Set up a systematic review request process after every appointment', tag:'Reviews · GBP', desc:'Do not rely on patients volunteering reviews. Create a short Google review link (go to your Google Business Profile → Get more reviews → copy the link) and text it to every patient within 2 hours of their appointment. Script for front desk: "It was great seeing you today. If you have 60 seconds, a Google review helps other North Brunswick families find us — here is the direct link." Target: one new review per week minimum. Assign one team member as the review owner.' },
    { id:'s2', section:'⭐ Google Business Profile', badge:'badge-seo', title:'Respond to every Google review within 48 hours — positive and negative', tag:'Reviews · GBP', desc:'Google rewards businesses that respond to reviews with higher local pack rankings. For positive reviews: thank the patient by first name, mention a specific detail they raised, and end with an invitation to return. For negative reviews: never be defensive, acknowledge the concern, invite them to call directly at 732-633-2255. Never argue publicly. Assign this task to one person — it takes less than 5 minutes per review.' },
    { id:'s3', section:'⭐ Google Business Profile', badge:'badge-seo', title:'Add photos to Google Business Profile every month — minimum 4 photos', tag:'Photos · GBP', desc:'Practices with 100+ photos on their GBP rank measurably higher in the local map pack. Take photos monthly: waiting room, treatment chairs, team members, before and after smiles (with consent), and the exterior of the building. Smartphone photos are fine — good lighting matters more than equipment. Upload directly to your GBP under the Photos section. Label each photo with a descriptive caption including "North Brunswick" and "Always Smile Dental Care." Goal: reach 100 total photos within 6 months.' },
    { id:'s4', section:'⭐ Google Business Profile', badge:'badge-seo', title:'Pre-populate the GBP Questions and Answers section', tag:'Q&A · GBP', desc:'Most practices leave the Q&A section empty — which means patients or strangers fill it with their own questions and wrong answers. Get ahead of it. Go to your GBP → Q&A → Ask a question yourself, then answer it yourself. Add these questions now: "Do you accept NJ Medicaid?" → Yes, we accept NJ FamilyCare and most major insurance plans. "Do you see children?" → Yes, we provide dental care for patients of all ages. "Are you accepting new patients?" → Yes, call 732-633-2255 or book at alwayssmiledentalcare.com. "Do you offer emergency appointments?" → Yes, call us at 732-633-2255.' },
    { id:'s5', section:'⭐ Google Business Profile', badge:'badge-seo', title:'Post to Google Business Profile at least twice per month', tag:'Posts · GBP', desc:'GBP posts appear in your Knowledge Panel and signal active engagement to Google. Post types that work well: new patient offer updates, article links (already in your content schedule), seasonal reminders (benefits expiry, back to school), team highlights, and community involvement. Posts expire after 7 days so consistency matters. Assign to whoever manages your social media — the same content can often be cross-posted to GBP and Instagram simultaneously.' },

    { id:'s6', section:'📋 Directory Citations', badge:'badge-seo', title:'Audit and standardize your NAP across all directories — use exact same format everywhere', tag:'Citations · NAP', desc:'NAP = Name, Address, Phone. Google uses consistency across directories to verify your business is legitimate. Your exact NAP must be identical everywhere: Always Smile Dental Care · 2000 NJ-27, North Brunswick Township, NJ 08902 · 732-633-2255. Do not use "Route 27" on some listings and "NJ-27" on others. Do not abbreviate "Township" to "Twp" inconsistently. Check and fix: Google Business Profile, Yelp, Healthgrades, Zocdoc, Vitals, WebMD, Facebook, Apple Maps, Bing Places. Use a free tool like Moz Local or BrightLocal to scan for inconsistencies.' },
    { id:'s7', section:'📋 Directory Citations', badge:'badge-seo', title:'Claim and complete your Healthgrades and Vitals profiles', tag:'Citations · Healthcare', desc:'Healthgrades and Vitals are the top healthcare-specific directories — they rank on the first page of Google for searches like "dentist North Brunswick NJ." Claim Dr. Fanuswala profile on both (search her name on each site → claim profile → verify via phone or email). Complete every field: photo, bio, insurance accepted (include NJ Medicaid explicitly), languages spoken, education (NYU College of Dentistry), and office hours. These profiles get thousands of monthly visitors and link back to alwayssmiledentalcare.com.' },
    { id:'s8', section:'📋 Directory Citations', badge:'badge-seo', title:'Claim Apple Maps and Bing Places listings', tag:'Citations · Maps', desc:'Most dental practices only think about Google Maps — but Apple Maps serves every iPhone user and Bing Maps serves Microsoft and Alexa devices. Claim Apple Maps at mapsconnect.apple.com (free, takes 10 minutes, verify via phone call). Claim Bing Places at bingplaces.com (free, import from Google Business Profile in one click). Both are easy wins that most competitors skip.' },
    { id:'s9', section:'📋 Directory Citations', badge:'badge-seo', title:'Add practice to NJ Dental Association member directory and NJ FamilyCare provider directory', tag:'Citations · NJ', desc:'The NJDA member directory (njda.com) and the NJ FamilyCare dental provider finder are both high-authority NJ-specific citations that patients actively use to find dentists. NJDA directory: log in to your NJDA member account and ensure your practice listing is complete and up to date. NJ FamilyCare directory: contact NJ Medicaid to confirm your practice appears correctly in their online provider search tool — search for yourself at njfamilycare.org to verify.' },

    { id:'s10', section:'🔗 Backlinks', badge:'badge-seo', title:'Ask referring physicians to list Always Smile as a recommended dental provider on their website', tag:'Backlinks · Referrals', desc:'When a pediatric practice or family medicine office lists you as their recommended dentist on their website, that is a backlink from a healthcare domain — one of the highest-value local SEO signals possible. After establishing a referral relationship with a physician, send a simple email: "We would love to be listed as a recommended dental resource for your patients — we can provide a short bio and logo for your website. We will of course do the same on ours." This is a mutual benefit and most offices say yes.' },
    { id:'s11', section:'🔗 Backlinks', badge:'badge-seo', title:'Submit to North Brunswick Township community resources page and local business directory', tag:'Backlinks · Local Gov', desc:'A backlink from a .gov domain carries significant SEO weight — Google treats government sites as highly authoritative. Go to northbrunswicknj.gov and look for a community resources section, local business directory, or health services page. Contact the township clerk or webmaster to request inclusion as a local healthcare provider. Also check Middlesex County health department resources at middlesexcountynj.gov. These are free, permanent backlinks that competitors rarely pursue.' },
    { id:'s12', section:'🔗 Backlinks', badge:'badge-seo', title:'Ensure NJ FamilyCare and insurance provider directories link to your website', tag:'Backlinks · Insurance', desc:'When you are listed as a participating provider in NJ Medicaid and insurance directories, those listings should link to alwayssmiledentalcare.com — not just show your phone number. Check each directory: NJ FamilyCare provider search, Delta Dental Find a Dentist, Cigna Find a Dentist, and any other networks you participate in. If the listing does not include a website link, contact the insurer to add it. Each one is a permanent backlink from a high-authority domain.' },

    { id:'s13', section:'🏗️ On-Page SEO', badge:'badge-seo', title:'Optimize page title and meta description for every main page', tag:'On-Page · Meta', desc:'Your page titles and meta descriptions are what appear in Google search results — they directly affect both rankings and click-through rate. Current likely title: "Always Smile Dental Care." Better title for homepage: "Dentist in North Brunswick NJ | NJ Medicaid Accepted | Always Smile Dental Care." For each service page, include the service + location: "Teeth Cleaning North Brunswick NJ | Always Smile Dental Care." Meta descriptions should be 150-160 characters, include the primary keyword, and end with a call to action. Ask your web developer to update these — it takes about 30 minutes per page.' },
    { id:'s14', section:'🏗️ On-Page SEO', badge:'badge-seo', title:'Add LocalBusiness and Dentist schema markup to your website', tag:'On-Page · Schema', desc:'Schema markup is hidden code that tells Google exactly what your business is, where it is, and what it does. Without it Google has to guess. With it, you are eligible for rich results (star ratings, hours, phone number in search results). Ask your web developer to add Dentist schema (schema.org/Dentist) to your homepage. It should include: name, address, phone, url, openingHours, priceRange, paymentAccepted (include Medicaid), geo coordinates, and image. Free tools to generate it: schema.dev or Google Structured Data Markup Helper. Test after implementation at search.google.com/structured-data/testing-tool.' },
    { id:'s15', section:'🏗️ On-Page SEO', badge:'badge-seo', title:'Ensure each community landing page has unique, substantive content', tag:'On-Page · Local Pages', desc:'Your website has landing pages for North Brunswick, South Brunswick, East Brunswick, Hillsborough, Princeton and others — but these only rank if each one has unique, meaningful content. Duplicate or thin pages (less than 300 words of unique text) are ignored or penalized by Google. Each community page should have: a paragraph about serving that specific community, local landmarks or context ("serving families near South Brunswick High School"), and mention of nearby main roads. If pages are currently duplicated, prioritize rewriting the top 3 by search volume: North Brunswick, South Brunswick, and New Brunswick.' },

    { id:'s16', section:'💬 Patient Reviews', badge:'badge-seo', title:'Create a short Google review link and add it to every patient communication', tag:'Reviews · System', desc:'Go to Google Business Profile → Home → Get more reviews → Copy the short URL. This link goes directly to the review box — no searching required. Add this link to: appointment confirmation texts, post-visit follow-up texts (send 2 hours after appointment), the email signature of everyone at the practice, the footer of your website, and your Instagram bio. The easier you make it, the more reviews you get. Use a URL shortener (bit.ly) to make it shareable in texts.' },
    { id:'s17', section:'💬 Patient Reviews', badge:'badge-seo', title:'Set a review target and track it monthly — minimum 4 new reviews per month', tag:'Reviews · Tracking', desc:'143 reviews is a strong base. To maintain local pack dominance you need a steady stream of new reviews — recency matters to Google. Target: 4 new reviews per month minimum (1 per week). Track this in your monthly practice meeting. If you fall below target, increase the ask cadence. Note: never offer incentives for reviews (gift cards, discounts) — this violates Google policy and can result in review removal or account suspension. The ask itself is enough — most patients are happy to help if you make it easy.' },

    { id:'s18', section:'🌏 Community & Cultural', badge:'badge-seo', title:'Post respectful acknowledgments for major South Asian cultural celebrations', tag:'Social · Community', desc:'Your patient demographic in North Brunswick has a large South Asian community that celebrates Eid al-Fitr, Eid al-Adha, Diwali, Navratri, and Holi. A simple, warm social post acknowledging each celebration — not commercializing it, just a respectful acknowledgment — builds genuine community connection that DSO competitors will never match. Keep it authentic: "Wishing our patients and the North Brunswick community a joyful Diwali 🪔" is enough. No dental promotion needed. Key dates for 2026-2027: Eid al-Fitr (Mar 2027), Diwali (Oct 2026), Navratri (Oct 2026), Holi (Mar 2027). Verify exact dates annually as they vary.' },
    { id:'s19', section:'🌏 Community & Cultural', badge:'badge-seo', title:'Offer at least one free community dental screening event per year', tag:'Community · Outreach', desc:'A free dental screening event — even a single Saturday morning for 2-3 hours — generates a press release, a Patch story, a Google Business post, social content, and physician referrals all at once. It is the single highest-return marketing activity a local dental practice can do. Logistics: pick a Saturday in September or October (good weather, back-to-school timing), partner with a local school, mosque, temple, or community center, screen 20-30 patients, and submit a press release to all three outlets the following Monday. Total cost: 3 hours of your time and a few boxes of supplies.' },

    // ── CONTENT STRATEGY — single info block ──
    { id:'strategy', section:'📋 Content Strategy', badge:'badge-purple', type:'infoblock',
      content:`<div style="margin-bottom:14px"><span style="font-size:12px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:0.5px">The Strategy in One Sentence</span><p style="font-size:14px;color:#374151;line-height:1.7;margin-top:6px">One op-ed or community article every 6–8 weeks, always tied to a real calendar hook, always written in Dr. Farida's voice, always submitted to the website first then to local press. Each article builds a permanent backlink, a local press citation, and brand authority in the North Brunswick community. The cumulative effect of 8–10 articles over 12 months is meaningful local SEO momentum that paid ads cannot replicate.</p></div><div><span style="font-size:12px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:0.5px">Publication Rules — Follow Every Time</span><ol style="margin-top:10px;padding-left:20px;display:flex;flex-direction:column;gap:8px"><li style="font-size:14px;color:#374151;line-height:1.6">Always publish on alwayssmiledentalcare.com/articles first — then submit to newspapers. Never the other way around.</li><li style="font-size:14px;color:#374151;line-height:1.6">Every article must read like community journalism, not advertising. Practice name appears only in the author bio at the bottom.</li><li style="font-size:14px;color:#374151;line-height:1.6">Submit to Patch first (self-serve, fastest). Then TAPinto by email. Then New Brunswick Today by email. Stagger by 48 hours.</li><li style="font-size:14px;color:#374151;line-height:1.6">Once published anywhere, add a Google Business Profile post with the article link within 24 hours.</li><li style="font-size:14px;color:#374151;line-height:1.6">Share on Facebook and Instagram the same day as publication. Keep captions short — let the article do the work.</li><li style="font-size:14px;color:#374151;line-height:1.6">Every article should include "North Brunswick" at least twice and "alwayssmiledentalcare.com" in the author bio — these are your primary local SEO signals.</li><li style="font-size:14px;color:#374151;line-height:1.6">Never submit the same article to two outlets simultaneously — stagger by 48 hours. Exception: the February article is big enough for all three outlets at once.</li></ol></div>` },

    { id:'a6', section:'📅 Content Schedule — 2026–2027', badge:'badge-blue', type:'article',
      num:6, date:'FEB 2027', tag:'ADA Calendar · ALL Outlets', deadline:`Write by Jan 15 · Submit Feb 1 · ALL outlets simultaneously`,
      title:`It's National Children's Dental Health Month — What North Brunswick Parents Need to Know`,
      desc:`February is National Children's Dental Health Month — sponsored by the ADA. The biggest article of the year — submit to ALL three outlets simultaneously. Focus on: first dental visit timing, handling dental anxiety in kids, and NJ FamilyCare coverage for preventive care at no cost.`,
      seo:`SEO targets: "children's dentist North Brunswick NJ" and "pediatric dental care Middlesex County"`,
      social:`📌 Feb 1 — Article share: February is National Children Dental Health Month. When should your child have their first dental visit? The answer might surprise you. Read Dr. Farida article at the link in bio. 📌 Daily tips Feb 2 to 14 — one post per day: Feb 2: First tooth equals first dental visit — the ADA recommends bringing your child within 6 months of their first tooth. Feb 3: Dental anxiety in kids is real and preventable — the key is a calm first visit before there is ever a problem. Feb 4: NJ FamilyCare covers 100 percent of preventive dental visits for children at no cost. Feb 5: Baby teeth matter even though they fall out — decay can affect the permanent teeth growing underneath. Feb 6: Best toothpaste for toddlers — a rice-grain sized amount of fluoride toothpaste starting at first tooth. Feb 7: Let kids pick their toothbrush color — children who choose are more likely to use it. Feb 8: Signs your child may have a toothache — touching their cheek, difficulty chewing, or refusing food. Feb 9: Kids with untreated tooth decay miss 3x more school days than those without dental problems. Feb 10: The two-minute rule — kids need 2 minutes of brushing twice a day. Use a song or timer. Feb 11: Sealants can prevent up to 80 percent of cavities in children — ask us about it. Feb 12: Juice contains as much sugar as soda — water is always the best drink for teeth. Feb 13: Mouth guards are essential for any child playing contact sports. We make custom-fit guards at Always Smile. Feb 14 Valentine Day: The best Valentine gift for your kids is a healthy smile. Book their checkup today.`,
      steps:[`a6s1:Write article by Jan 15`,`a6s2:Publish on alwayssmiledentalcare.com/articles first`,`a6s3:Submit to Patch Feb 1`,`a6s4:Submit to TAPinto Feb 1 — all outlets simultaneously for this article`,`a6s5:Submit to New Brunswick Today Feb 1`,`a6s6:Post article link to Google Business Profile`,`a6s7:Run 14-day daily tip series on social throughout February`] },

    { id:'a7', section:'📅 Content Schedule — 2026–2027', badge:'badge-blue', type:'article',
      num:7, date:'APR 2027', tag:'Health Education', deadline:`Write by Mar 20 · Submit Apr 1`,
      title:`The Link Between Gum Disease and Heart Disease — What Your North Brunswick Dentist Wants You to Know`,

      seo:`SEO targets: "adult dentist North Brunswick" and "general dentistry Middlesex County"`,
      social:`📌 Apr 1 — Article share: Did you know your mouth is a window into your overall health? Dr. Farida explains the link between gum disease and heart disease. Link in bio. 📌 Apr 7 — World Oral Health Day: People with gum disease are 2 to 3 times more likely to have a heart attack or stroke. Your cleaning is not just about your teeth. Tag ADA and ADHA for potential reshare. 📌 Apr 14: Gum disease has been linked to diabetes complications, premature birth, and Alzheimer disease. A preventive cleaning covered by insurance is one of the most important health appointments you can keep. 📌 Apr 21: Signs of gum disease most people ignore — bleeding when you brush, puffy or red gums, bad breath that does not go away. These are not normal. Call us: 732-633-2255.`,

  ];

  // ── TAB CONFIG ──
  const TAB_SECTIONS = {
    website: new Set(['🔴 Critical — Fix Before Op-Ed Goes Live','🟡 Important — Fix Soon','🟢 Nice to Have — When Time Allows']),
    seo: new Set(['⭐ Google Business Profile','📋 Directory Citations','🔗 Backlinks','🏗️ On-Page SEO','💬 Patient Reviews','🌏 Community & Cultural']),
    content: new Set(['📋 Content Strategy','📅 Content Schedule — 2026–2027'])
  };

  const TAB_COLORS = {
    website: '#1A5276', seo: '#92400E', content: '#5B21B6'
  };
  const TAB_BAR_COLORS = {
    website: '#2E86C1', seo: '#D97706', content: '#7C3AED'
  };

  let state = { checks:{}, notes:{}, lastUpdated:null };
  let saveTimer = null;
  let pinEntry = '';
  let activeTab = 'dashboard';

  // ── PIN ──
  async function pinSubmit() {
    const h = Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pinEntry)))).map(b=>b.toString(16).padStart(2,'0')).join('');
    const c = Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode('0000')))).map(b=>b.toString(16).padStart(2,'0')).join('');
    if (h === c) {
      localStorage.setItem(PIN_KEY,'1');
      document.getElementById('pinScreen').style.display='none';
      document.getElementById('app').style.display='flex';
      loadFromCloud();
    } else {
      document.getElementById('pinError').classList.add('show');
      document.querySelectorAll('.pin-dot').forEach(d=>d.style.background='#fca5a5');
      setTimeout(()=>{ pinEntry=''; updateDots(); document.getElementById('pinError').classList.remove('show'); document.querySelectorAll('.pin-dot').forEach(d=>d.style.background=''); }, 800);
    }
  }
  function pinPress(d){ if(pinEntry.length>=4) return; pinEntry+=d; updateDots(); if(pinEntry.length===4) setTimeout(pinSubmit,150); }
  function pinClear(){ pinEntry=pinEntry.slice(0,-1); updateDots(); }
  function updateDots(){ for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length); }

  // ── SYNC ──
  function setSyncStatus(msg,type){
    document.getElementById('syncStatus').textContent=msg;
    document.getElementById('syncDot').className='sync-dot'+(type==='syncing'?' syncing':type==='error'?' error':'');
  }
  function updateLastUpdated(ts){
    if(!ts) return;
    document.getElementById('lastUpdated').textContent='Updated: '+new Date(ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true})+' EST';
  }

  async function loadFromCloud(){
    setSyncStatus('Loading...','syncing');
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
      if(!res.ok) throw new Error();
      const data = await res.json();
      const d = (data.record||{}).asdc_checklist||{};
      state.checks = d.checks||{};
      state.notes = d.notes||{};
      state.lastUpdated = d.lastUpdated||null;
      updateLastUpdated(state.lastUpdated);
      setSyncStatus('Synced','ok');
    } catch {
      setSyncStatus('Offline','error');
      const local = localStorage.getItem(STORAGE_KEY);
      if(local) try { const p=JSON.parse(local); state.checks=p.checks||{}; state.notes=p.notes||{}; state.lastUpdated=p.lastUpdated||null; } catch {}
    }
    renderAll();
  }

  async function saveToCloud(){
    setSyncStatus('Saving...','syncing');
    state.lastUpdated = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    updateLastUpdated(state.lastUpdated);
    try {
      const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
      const cur = getRes.ok ? await getRes.json() : {record:{}};
      const merged = Object.assign({},cur.record||{},{asdc_checklist:{checks:state.checks,notes:state.notes,lastUpdated:state.lastUpdated}});
      const put = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(merged)});
      if(!put.ok) throw new Error();
      setSyncStatus('Saved ✓','ok');
    } catch { setSyncStatus('Saved locally','error'); }
  }
  function queueSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveToCloud,1200); }

  // ── TABS ──
  function switchTab(tab){
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('panel-'+tab).classList.add('active');
  }

  function jumpToNext(tabId){
    const container = document.getElementById('render-'+tabId);
    if (!container) return;
    // Find first unchecked item element within this tab's render container
    const items = container.querySelectorAll('.item:not(.done), .sub-step:not(.done)');
    if (items.length > 0) {
      items[0].scrollIntoView({behavior:'smooth', block:'center'});
      // Flash it briefly to highlight
      items[0].style.transition = 'background 0.2s';
      items[0].style.background = '#EFF6FF';
      setTimeout(() => { items[0].style.background = ''; }, 1000);
    }
  }

  // ── PROGRESS HELPERS ──
  function getTabProgress(tabId){
    const sections = TAB_SECTIONS[tabId];
    let total=0,done=0,nextTask=null;
    TASKS.forEach(task=>{
      if(!sections.has(task.section)) return;
      if(task.type==='infoblock') return;
      if(task.type==='article'){
        task.steps.forEach(s=>{ const sid=s.split(':')[0]; total++; if(state.checks[sid]) done++; });
        if(!nextTask && task.steps.some(s=>!state.checks[s.split(':')[0]])) nextTask=task.title;
      } else {
        total++; if(state.checks[task.id]) done++;
        if(!nextTask && !state.checks[task.id]) nextTask=task.title;
      }
    });
    return {total,done,nextTask};
  }

  function getTotalProgress(){
    let total=0,done=0;
    ['website','seo','content'].forEach(tab=>{ const p=getTabProgress(tab); total+=p.total; done+=p.done; });
    return {total,done};
  }

  // ── RENDER ALL ──
  function renderAll(){
    renderDashboard();
    renderTab('website');
    renderTab('seo');
    renderTab('content');
    updateBottomBar();
    updateTabPills();
  }

  function updateTabPills(){
    ['website','seo','content'].forEach(tab=>{
      const {total,done}=getTabProgress(tab);
      const pill=document.getElementById('pill-'+tab);
      if(!pill) return;
      pill.textContent=done+'/'+total;
      pill.className='tab-pill'+(done===total&&total>0?' complete':'');
    });
  }

  function updateBottomBar(){
    const {total,done}=getTotalProgress();
    document.getElementById('totalDone').textContent=done;
    document.getElementById('totalAll').textContent=total;
    document.getElementById('allDoneBanner').classList.toggle('show',total>0&&done===total);
  }

  // ── DASHBOARD ──
  function renderDashboard(){
    const grid = document.getElementById('dashGrid');
    grid.innerHTML='';
    const tabs=[
      {id:'website',icon:'🌐',label:'Website Updates'},
      {id:'seo',icon:'🔍',label:'SEO Foundation'},
      {id:'content',icon:'📅',label:'Content Schedule'}
    ];
    // Overall bar
    const {total:ot,done:od}=getTotalProgress();
    const opct=ot?Math.round((od/ot)*100):0;
    document.getElementById('overallBar').style.width=opct+'%';
    document.getElementById('overallLabel').textContent=od+' of '+ot+' complete ('+opct+'%)';

    tabs.forEach(({id,icon,label})=>{
      const {total,done,nextTask}=getTabProgress(id);
      const pct=total?Math.round((done/total)*100):0;
      const color=TAB_BAR_COLORS[id];
      const card=document.createElement('div');
      card.className='dash-card';
      card.onclick=()=>switchTab(id);
      card.innerHTML=`
        <div class="dash-card-icon">${icon}</div>
        <div class="dash-card-title">${label}</div>
        <div class="dash-card-progress">${done} of ${total} complete (${pct}%)</div>
        <div class="dash-bar-bg"><div class="dash-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        ${nextTask?`<div class="next-task"><div class="next-task-label">Next up</div>${nextTask}</div>`:'<div class="next-task" style="color:#16A34A;font-weight:600">✅ All done!</div>'}`;
      grid.appendChild(card);
    });
  }

  // ── RENDER TAB ──
  function renderTab(tabId){
    const container=document.getElementById('render-'+tabId);
    container.innerHTML='';
    const sections=TAB_SECTIONS[tabId];
    let currentSection='';
    let card=null;
    let globalNum=0;

    TASKS.forEach(task=>{
      if(!sections.has(task.section)) return;

      if(task.section!==currentSection){
        currentSection=task.section;
        const sec=document.createElement('div');
        sec.className='section';
        const hdr=document.createElement('div');
        hdr.className='section-header';
        hdr.innerHTML=`<span class="priority-badge ${task.badge}">${task.section}</span>`;
        sec.appendChild(hdr);
        card=document.createElement('div');
        card.className='card';
        sec.appendChild(card);
        container.appendChild(sec);
      }

      if(task.type==='infoblock'){
        const el=document.createElement('div');
        el.className='info-block';
        el.innerHTML=task.content;
        card.appendChild(el);
        return;
      }

      if(task.type==='article'){
        globalNum++;
        renderArticle(task,card,globalNum);
        return;
      }

      // Standard task
      globalNum++;
      const checked=!!state.checks[task.id];
      const noteVal=state.notes[task.id]||'';
      const item=document.createElement('div');
      item.className='item'+(checked?' done':'');
      item.dataset.id=task.id;
      item.innerHTML=`
        <div class="checkbox" onclick="toggleItem('${task.id}')">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="item-body">
          <div class="item-header">
            <span class="item-number">${String(globalNum).padStart(2,'0')}</span>
            <span class="item-title">${task.title}</span>
            ${!checked?`<span class="page-tag">${task.tag}</span>`:''}
          </div>
          ${!checked?`
            <div class="item-desc">${task.desc}</div>
            <span class="note-label">Notes</span>
            <textarea class="note-area" placeholder="Add a note..." onclick="event.stopPropagation()" oninput="saveNote('${task.id}',this.value)">${noteVal}</textarea>
          `:`<div class="done-stamp">✓ Completed</div>`}
        </div>
        <button class="delete-btn" onclick="deleteTask('${task.id}')" title="Delete">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/></svg>
        </button>`;
      card.appendChild(item);
    });
  }

  function renderArticle(task,card,num){
    const noteVal=state.notes[task.id]||'';
    const doneCount=task.steps.filter(s=>!!state.checks[s.split(':')[0]]).length;
    const allDone=doneCount===task.steps.length;
    const item=document.createElement('div');
    item.className='item article-item'+(allDone?' done':'');
    item.dataset.id=task.id;
    item.innerHTML=`
      <div style="width:100%">
        <div class="item-header" style="margin-bottom:8px">
          <span class="item-number">Article ${num}</span>
          <span style="font-size:12px;font-weight:700;color:#7C3AED;background:#EDE9FE;padding:2px 10px;border-radius:20px">${task.date}</span>
          <span class="page-tag">${task.tag}</span>
          <span style="font-size:12px;color:#6B7280;margin-left:auto">${doneCount}/${task.steps.length} steps</span>
        </div>
        <div class="item-title" style="margin-bottom:6px">${task.title}</div>
        <div class="item-desc" style="margin-bottom:6px">${task.desc}</div>
        <div style="font-size:12px;color:#6B7280;font-style:italic;margin-bottom:8px">${task.seo}</div>
        ${task.social?`<div class="social-box"><span class="social-label">📱 SOCIAL SUGGESTIONS</span><span class="social-text">${task.social}</span></div>`:''}
        <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:10px">DEADLINE: <span style="color:#B91C1C">${task.deadline}</span></div>
        <div>
          ${task.steps.map(s=>{
            const [sid,...lp]=s.split(':');
            const label=lp.join(':');
            const chk=!!state.checks[sid];
            return `<div class="sub-step${chk?' done':''}" data-stepid="${sid}" onclick="toggleStep('${sid}')">
              <div class="sub-step-check">
                ${chk?'<svg width="11" height="9" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
              </div>
              <span class="sub-step-label">${label}</span>
            </div>`;
          }).join('')}
        </div>
        <span class="note-label">Notes</span>
        <textarea class="note-area" placeholder="Add a note..." onclick="event.stopPropagation()" oninput="saveNote('${task.id}',this.value)">${noteVal}</textarea>
      </div>`;
    card.appendChild(item);
  }

  // ── ACTIONS ──
  function toggleItem(id){
    state.checks[id]=!state.checks[id];
    renderAll();
    queueSave();
  }

  function toggleStep(sid){
    state.checks[sid]=!state.checks[sid];
    renderAll();
    queueSave();
  }

  function saveNote(id,val){
    state.notes[id]=val;
    queueSave();
  }

  function deleteTask(id){
    const task=TASKS.find(t=>t.id===id);
    if(!confirm(`Delete: "${task?task.title:id}"?

This cannot be undone.`)) return;
    TASKS.splice(TASKS.indexOf(task),1);
    delete state.checks[id];
    delete state.notes[id];
    renderAll();
    queueSave();
  }

  async function resetAll(){
    if(!confirm('Reset ALL checkboxes and notes for everyone? Cannot be undone.')) return;
    state.checks={}; state.notes={};
    renderAll();
    await saveToCloud();
  }

  // ── INIT ──
  window.addEventListener('DOMContentLoaded',()=>{
    if(localStorage.getItem(PIN_KEY)==='1'){
      document.getElementById('pinScreen').style.display='none';
      document.getElementById('app').style.display='flex';
      loadFromCloud();
    }
    setInterval(()=>{ if(localStorage.getItem(PIN_KEY)==='1') loadFromCloud(); },30000);
  });
</script>
</body>
</html>
