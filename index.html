<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Always Smile Dental Care — ATG</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#ffffff;color:#111111;min-height:100vh;font-size:16px}

  /* ── PIN ── */
  #pinScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#1A5276 0%,#2E86C1 100%)}
  #pinScreen h2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
  #pinScreen p{font-size:15px;color:#AED6F1;margin-bottom:32px}
  .pin-dots{display:flex;gap:14px;margin-bottom:28px}
  .pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);transition:all 0.15s}
  .pin-dot.filled{background:white;border-color:white}
  .pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
  .pin-btn{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;font-size:22px;font-weight:500;cursor:pointer;transition:all 0.15s}
  .pin-btn:hover{background:rgba(255,255,255,0.25)}
  .pin-btn:active{transform:scale(0.93)}
  #pinError{color:#fca5a5;font-size:14px;margin-top:16px;display:none}
  #pinError.show{display:block}

  /* ── APP ── */
  #app{display:none}

  .header{background:linear-gradient(135deg,#1A5276 0%,#2E86C1 100%);padding:32px 24px 24px;color:white}
  .header-inner{max-width:900px;margin:0 auto}
  .header h1{font-size:24px;font-weight:700}
  .header p{font-size:14px;color:#AED6F1;margin-top:4px}
  .sync-bar{display:flex;align-items:center;gap:8px;margin-top:10px}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;flex-shrink:0;transition:background 0.3s}
  .sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
  .sync-dot.error{background:#ef4444}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .sync-status{font-size:13px;opacity:0.8}
  #lastUpdated{font-size:12px;opacity:0.55;margin-left:4px}
  .progress-bar-wrap{background:rgba(255,255,255,0.2);border-radius:20px;height:10px;margin-top:16px;overflow:hidden}
  .progress-bar-fill{height:100%;background:#58D68D;border-radius:20px;transition:width 0.4s ease;width:0%}
  .progress-label{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .progress-label span{font-size:13px;color:#AED6F1}
  .progress-label strong{font-size:15px;color:white}

  .container{max-width:900px;margin:0 auto;padding:28px 20px 90px}
  .section{margin-bottom:32px}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .priority-badge{font-size:12px;font-weight:700;letter-spacing:0.5px;padding:4px 12px;border-radius:20px;text-transform:uppercase;flex-shrink:0}
  .badge-red{background:#FEE2E2;color:#B91C1C}
  .badge-amber{background:#FEF3C7;color:#92400E}
  .badge-green{background:#D1FAE5;color:#065F46}
  .badge-blue{background:#DBEAFE;color:#1E40AF}
  .badge-purple{background:#EDE9FE;color:#5B21B6}

  .card{background:#ffffff;border:1.5px solid #E5E7EB;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}

  .item{display:flex;align-items:flex-start;gap:16px;padding:18px 20px;border-bottom:1.5px solid #F3F4F6;transition:background 0.15s;position:relative}
  .item:last-child{border-bottom:none}
  .item:hover{background:#FAFAFA}
  .item.done{background:#F0FDF4}
  .item.done .item-title{text-decoration:line-through;color:#9CA3AF}
  .item.done .item-desc{color:#D1D5DB}

  .checkbox{width:24px;height:24px;border-radius:7px;border:2px solid #D1D5DB;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all 0.2s;background:white;cursor:pointer}
  .item.done .checkbox{background:#16A34A;border-color:#16A34A}
  .checkbox svg{display:none}
  .item.done .checkbox svg{display:block}

  .item-body{flex:1;min-width:0}
  .item-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .item-number{font-size:12px;font-weight:700;color:#6B7280;background:#F3F4F6;padding:2px 8px;border-radius:10px;flex-shrink:0}
  .item-title{font-size:16px;font-weight:600;color:#111111;line-height:1.4}
  .page-tag{font-size:11px;font-weight:600;color:#1D4ED8;background:#DBEAFE;padding:2px 8px;border-radius:8px;flex-shrink:0}
  .item-desc{font-size:14px;color:#374151;line-height:1.6;margin-bottom:10px}
  .done-stamp{font-size:12px;color:#16A34A;font-weight:600;margin-bottom:8px;display:none}
  .item.done .done-stamp{display:block}
  .note-label{font-size:11px;font-weight:700;color:#9CA3AF;letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:4px}
  .note-area{width:100%;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:7px;color:#111111;font-size:14px;font-family:inherit;padding:9px 12px;resize:vertical;min-height:58px;transition:border-color 0.2s;line-height:1.5}
  .note-area:focus{outline:none;border-color:#2E86C1;background:#fff}
  .note-area::placeholder{color:#9CA3AF}

  /* Delete button */
  .delete-btn{position:absolute;top:14px;right:16px;width:28px;height:28px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.2s;color:#EF4444}
  .item:hover .delete-btn{opacity:1}
  .delete-btn:hover{background:#FEE2E2}

  .all-done-banner{display:none;background:linear-gradient(135deg,#15803D,#16A34A);color:white;text-align:center;padding:20px;border-radius:12px;margin-bottom:28px;font-size:17px;font-weight:600}
  .all-done-banner.show{display:block}

  .summary-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1.5px solid #E5E7EB;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 16px rgba(0,0,0,0.07);z-index:100}
  .summary-left{font-size:15px;color:#374151;display:flex;align-items:center;gap:10px}
  .summary-left strong{color:#1A5276;font-size:16px}
  .reset-btn{font-size:13px;color:#6B7280;background:none;border:1.5px solid #E5E7EB;padding:7px 16px;border-radius:20px;cursor:pointer;transition:all 0.2s}
  .reset-btn:hover{border-color:#EF4444;color:#EF4444}
</style>
</head>

<script>
  // ── CONFIG ──
  const BIN_ID = '6a3ca67eda38895dfefb0c07';
  const API_KEY = '$2a$10$4aH/RKWn7NmW7cwBiDm09OBT4bHwMecicfSywrrHQ1cjssRzCA1IO';
  const STORAGE_KEY = 'asdc_checklist_v3';
  const PIN_SESSION_KEY = 'asdc_pin_ok';

  // ── TASK DATA ──
  let TASKS = [
    { id:'t1', section:'🔴 Critical — Fix Before Op-Ed Goes Live', badge:'badge-red', title:'Fix all 5 FAQ answers on About Us page', tag:'About Us', desc:'Every FAQ shows the same wrong answer: "Yes, we accept most major dental insurance plans." Questions include: What services do you offer? How often should I visit? What can I expect on my first visit? Do you offer emergency care? Each needs its own correct answer.' },
    { id:'t2', section:'🔴 Critical — Fix Before Op-Ed Goes Live', badge:'badge-red', title:'Add NJ Medicaid / NJ FamilyCare to the insurance section', tag:'Homepage', desc:'Insurance logos show Aetna, Blue Cross, Cigna, Delta, Guardian, Humana, MetLife — but NJ Medicaid is missing. The op-ed explicitly states the practice accepts NJ Medicaid. Add NJ FamilyCare before the article goes live.' },
    { id:'t3', section:'🔴 Critical — Fix Before Op-Ed Goes Live', badge:'badge-red', title:'Fix New Patient Special price — $109 vs $129 vs $129.99', tag:'Homepage', desc:'Three different prices appear for the same offer: hero section shows $109, pricing cards show $129, the booking form shows $129.99. Pick one and apply consistently across every page, section, and form.' },
    { id:'t4', section:'🔴 Critical — Fix Before Op-Ed Goes Live', badge:'badge-red', title:'Publish the op-ed under the Articles section', tag:'Articles', desc:'The op-ed "Your Neighbors Have Dental Insurance — And Still Can\'t Find a Dentist" must be published on alwayssmiledentalcare.com/articles/ BEFORE submitting to any newspaper. This establishes the canonical URL and gives newspapers a live link to reference.' },
    { id:'t5', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Add NYU College of Dentistry credential to Dr. Farida\'s bio', tag:'Homepage · About Us', desc:'The bio mentions "over 10 years of experience" but never mentions NYU. A reviewer wrote: "I came across a Dr. who had graduated from NYU, and I knew that I will not be wrong." Add: "Dr. Fanuswala earned her DDS from NYU College of Dentistry, one of the nation\'s leading dental schools."' },
    { id:'t6', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Ensure Negative Review is not seen on Website', tag:'Homepage · About Us', desc:'The 1-star review from "S A" is visible in the testimonials section on both pages. Check the Trustindex / Google Reviews widget settings to filter reviews below a minimum star rating. The review stays on Google — but should not appear on your own website pages.' },
    { id:'t7', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Remove "dental practices throughout the world" from About Us', tag:'About Us', desc:'The About Us intro includes leftover template copy: "With dental practices throughout the world." Always Smile Dental Care is one practice in North Brunswick, NJ. Remove or replace this sentence entirely.' },
    { id:'t8', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Fix "Franklin Towship" typo in footer', tag:'All Pages — Footer', desc:'The footer lists "Franklin Towship" — missing the \'n\'. Should read "Franklin Township." Appears in both the community links list and footer neighborhood section on all pages.' },
    { id:'t9', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Fix Wednesday missing from appointment booking form', tag:'Homepage · Booking Form', desc:'Hours show Tuesday, Wednesday, Friday, Saturday but the booking form only lists Tuesday, Friday, Saturday — Wednesday is missing. Either add Wednesday to the form or remove it from the hours display.' },
    { id:'t10', section:'🟡 Important — Fix Soon', badge:'badge-amber', title:'Fix "Guranteed" typo on pricing card', tag:'Homepage', desc:'The Free Second Opinion pricing card reads "Guranteed discount." Fix the spelling to "Guaranteed" in both the card headline and the bullet point below it.' },
    { id:'t11', section:'🟢 Nice to Have — When Time Allows', badge:'badge-green', title:'Update "hundreds of families" to reflect true scale', tag:'Homepage · About Us', desc:'The bio says "hundreds of families." With 143 Google reviews and a fully booked schedule the practice has seen thousands of patients. Update to "thousands of patients" or pull a specific number from the practice management system.' },
    { id:'t12', section:'🟢 Nice to Have — When Time Allows', badge:'badge-green', title:'Update hours when GP associate is hired and new days open', tag:'Homepage · All Pages', desc:'Once a GP associate is hired and the practice expands, update hours on the homepage, contact page, Google Business Profile, and all directory listings simultaneously. Inconsistent hours across platforms is a common SEO problem.' },
    { id:'t13', section:'🟢 Nice to Have — When Time Allows', badge:'badge-green', title:'Personalize the About Us mission and vision text', tag:'About Us', desc:'Current mission and vision are generic template language. Rewrite to reflect the practice\'s actual values — accessible care for all insurance types, serving the diverse Middlesex County community, dental care for all ages.' },
    { id:'t14', section:'📰 Op-Ed — Publication Checklist', badge:'badge-blue', title:'Post Patch article URL to Google Business Profile', tag:'Google Business', desc:'Get the live Patch article URL and add it as a Google Business Profile post: "We were featured in Patch NJ" with the link. Free local SEO signal — do this within 24 hours of the article going live on Patch.' },
    { id:'t15', section:'📰 Op-Ed — Publication Checklist', badge:'badge-blue', title:'Publish op-ed on alwayssmiledentalcare.com Articles section', tag:'Website', desc:'Post the article under the Articles section at alwayssmiledentalcare.com before TAPinto and New Brunswick Today submissions go out. Having it on your own site with a live URL strengthens all subsequent submissions.' },
    { id:'t16', section:'📰 Op-Ed — Publication Checklist', badge:'badge-blue', title:'Share Patch feature on Facebook and Instagram', tag:'Social Media', desc:'Post on both platforms: "Dr. Farida was featured in Patch NJ" with the article link. Tag @PatchNJ if possible. Keep the caption short and community-focused — let the article speak for itself.' },
    { id:'t17', section:'📰 Op-Ed — Publication Checklist', badge:'badge-blue', title:'Submit op-ed to TAPinto East Brunswick', tag:'TAPinto', desc:'Email rrakossy@tapinto.net with the cover email drafted, Word doc attached, and one photo of Dr. Farida. Reference the live Patch URL. Stagger 48 hours after Patch submission. Subject line: "Op-Ed Submission: Dental Access and NJ Medicaid in Middlesex County".' },
    { id:'t18', section:'📰 Op-Ed — Publication Checklist', badge:'badge-blue', title:'Submit op-ed to New Brunswick Today — Charlie Kratovil', tag:'New Brunswick Today', desc:'Email editor@newbrunswicktoday.com with cover letter and Word doc attached. Charlie Kratovil is the editor (732-993-9697). Reference Patch publication. Stagger 48 hours after TAPinto submission.' },
    { id:'t19', section:'📅 Content Schedule — 2026–2027', badge:'badge-purple', title:'AUG 2026 — "Back to School, Back to the Dentist"', tag:'Write by Jul 20 · Submit Aug 1', desc:'Back-to-school is one of the strongest local journalism hooks. Many NJ schools require dental sign-off for enrollment. Frame it around families in North Brunswick and South Brunswick. Mention NJ FamilyCare covers preventive visits at no cost. Submit to Patch first, then TAPinto. SEO target: "family dentist North Brunswick."' },
    { id:'t20', section:'📅 Content Schedule — 2026–2027', badge:'badge-purple', title:'OCT 2026 — "National Dental Hygiene Month: 5 Habits That Will Save Your Teeth"', tag:'Write by Sep 20 · Submit Oct 1', desc:'October is National Dental Hygiene Month — an ADA-recognized calendar event that gives any editor a built-in reason to publish. Keep it practical: 5 specific habits (brush choice, flossing timing, mouthwash, diet, the one thing most people skip). End with a call to book a cleaning. SEO target: "dental cleaning North Brunswick NJ."' },
    { id:'t21', section:'📅 Content Schedule — 2026–2027', badge:'badge-purple', title:'OCT 2026 — "Halloween Candy and Your Teeth — What a North Brunswick Dentist Really Thinks"', tag:'Submit by Oct 20 · Patch only', desc:'Short, fun, shareable piece (300–400 words). Rank candy from worst to least bad for teeth. Extremely shareable on social media and very likely to get Patch traffic. Also post as a social media series: "Worst Halloween candy for your teeth" countdown — one post per day for 5 days before Halloween.' },
    { id:'t22', section:'📅 Content Schedule — 2026–2027', badge:'badge-purple', title:'DEC 2026 — "Use Your Dental Benefits Before They Expire"', tag:'Submit by Dec 1', desc:'Most PPO dental insurance plans reset on January 1. Millions in benefits go unused every year. This article drives year-end bookings — genuinely useful to readers. Frame it as a financial reminder, not a promotional pitch: "You\'ve already paid for it — don\'t let it go to waste." Submit to Patch and TAPinto. SEO target: "dentist accepting new patients North Brunswick."' },
    { id:'t23', section:'📅 Content Schedule — 2026–2027', badge:'badge-purple', title:'FEB 2027 — "National Children\'s Dental Health Month — What North Brunswick Parents Need to Know"', tag:'Write by Jan 15 · Submit Feb 1 · ALL outlets', desc:'February is National Children\'s Dental Health Month — sponsored by the ADA, recognized nationally. Biggest article of the year — submit to Patch, TAPinto, AND New Brunswick Today simultaneously. Focus on: first dental visit timing, handling dental anxiety in kids, and NJ FamilyCare coverage for preventive care. Run a daily tip series on social for the first 2 weeks of February. SEO targets: "children\'s dentist North Brunswick NJ" and "pediatric dental care Middlesex County."' },
    { id:'t24', section:'📅 Content Schedule — 2026–2027', badge:'badge-purple', title:'APR 2027 — "The Link Between Gum Disease and Heart Disease"', tag:'Write by Mar 20 · Submit Apr 1', desc:'April is Oral Cancer Awareness Month and World Oral Health Day (Apr 7). The gum disease / heart disease link is peer-reviewed, dramatic, and genuinely surprising to most readers. This positions Dr. Farida as a health authority beyond teeth. Broad adult audience, high shareability. No competitor in North Brunswick is writing about this. SEO target: "adult dentist North Brunswick" and "general dentistry Middlesex County."' },
    { id:'t25', section:'📅 Content Schedule — 2026–2027', badge:'badge-purple', title:'JUN 2027 — "One Year of Always Smile in North Brunswick — What We\'ve Learned About Our Community"', tag:'Write by May 20 · Submit Jun 1 · Lead with New Brunswick Today', desc:'By June 2027 the practice will have 12+ months of growth, a GP associate on board, and a body of community press. A reflective "what we\'ve learned" piece is genuinely newsworthy as a local business story. Lead with New Brunswick Today for this one — it\'s their kind of story. Frame around the community: what surprised you, what gaps you filled, where you\'re headed. This is the article that cements Always Smile as a community institution, not just a business.' },
  ];

  let state = { checks: {}, notes: {}, taskOrder: null, lastUpdated: null };
  let saveTimer = null;
  let pinEntry = '';

  // ── PIN ──
  async function pinSubmit() {
    const hash = Array.from(new Uint8Array(
      await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pinEntry))
    )).map(b => b.toString(16).padStart(2,'0')).join('');
    const correctHash = Array.from(new Uint8Array(
      await crypto.subtle.digest('SHA-256', new TextEncoder().encode('0000'))
    )).map(b => b.toString(16).padStart(2,'0')).join('');

    if (hash === correctHash) {
      sessionStorage.setItem(PIN_SESSION_KEY, '1');
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadFromCloud();
    } else {
      document.getElementById('pinError').classList.add('show');
      document.querySelectorAll('.pin-dot').forEach(d => d.style.background = '#fca5a5');
      setTimeout(() => {
        pinEntry = ''; updateDots();
        document.getElementById('pinError').classList.remove('show');
        document.querySelectorAll('.pin-dot').forEach(d => d.style.background = '');
      }, 800);
    }
  }

  function pinPress(d) { if (pinEntry.length >= 4) return; pinEntry += d; updateDots(); if (pinEntry.length === 4) setTimeout(pinSubmit, 150); }
  function pinClear() { pinEntry = pinEntry.slice(0,-1); updateDots(); }
  function updateDots() { for (let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i < pinEntry.length); }

  // ── SYNC ──
  function setSyncStatus(msg, type) {
    document.getElementById('syncStatus').textContent = msg;
    document.getElementById('syncDot').className = 'sync-dot' + (type==='syncing'?' syncing':type==='error'?' error':'');
  }

  function updateLastUpdated(ts) {
    if (!ts) return;
    const el = document.getElementById('lastUpdated');
    if (!el) return;
    el.textContent = 'Last updated: ' + new Date(ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true}) + ' EST';
  }

  // ── CLOUD ──
  async function loadFromCloud() {
    setSyncStatus('Loading...','syncing');
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
      if (!res.ok) throw new Error();
      const data = await res.json();
      const d = (data.record||{}).asdc_checklist || {};
      state.checks = d.checks || {};
      state.notes = d.notes || {};
      state.taskOrder = d.taskOrder || null;
      state.lastUpdated = d.lastUpdated || null;
      // Apply saved task order (deletions)
      if (state.taskOrder) TASKS = TASKS.filter(t => state.taskOrder.includes(t.id));
      updateLastUpdated(state.lastUpdated);
      setSyncStatus('Synced','ok');
    } catch {
      setSyncStatus('Offline — changes save locally','error');
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) try { const p=JSON.parse(local); state=Object.assign(state,p); if(state.taskOrder) TASKS=TASKS.filter(t=>state.taskOrder.includes(t.id)); } catch {}
    }
    render();
  }

  async function saveToCloud() {
    setSyncStatus('Saving...','syncing');
    state.lastUpdated = new Date().toISOString();
    state.taskOrder = TASKS.map(t=>t.id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    updateLastUpdated(state.lastUpdated);
    try {
      const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
      const cur = getRes.ok ? await getRes.json() : {record:{}};
      const merged = Object.assign({}, cur.record||{}, {
        asdc_checklist: { checks:state.checks, notes:state.notes, taskOrder:state.taskOrder, lastUpdated:state.lastUpdated }
      });
      const put = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
        method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':API_KEY}, body:JSON.stringify(merged)
      });
      if (!put.ok) throw new Error();
      setSyncStatus('Saved ✓','ok');
    } catch { setSyncStatus('Saved locally (cloud unavailable)','error'); }
  }

  function queueSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToCloud, 1200); }

  // ── RENDER ──
  function render() {
    const container = document.getElementById('taskList');
    container.innerHTML = '';
    let currentSection = '';
    let card = null;
    let globalNum = 0;

    TASKS.forEach(task => {
      if (task.section !== currentSection) {
        currentSection = task.section;
        const sec = document.createElement('div');
        sec.className = 'section';
        const hdr = document.createElement('div');
        hdr.className = 'section-header';
        hdr.innerHTML = `<span class="priority-badge ${task.badge}">${task.section}</span>`;
        sec.appendChild(hdr);
        card = document.createElement('div');
        card.className = 'card';
        sec.appendChild(card);
        container.appendChild(sec);
      }
      globalNum++;
      const checked = !!state.checks[task.id];
      const noteVal = state.notes[task.id] || '';

      const item = document.createElement('div');
      item.className = 'item' + (checked ? ' done' : '');
      item.dataset.id = task.id;
      item.innerHTML = `
        <div class="checkbox" onclick="toggleItem('${task.id}')">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="item-body">
          <div class="item-header">
            <span class="item-number">${String(globalNum).padStart(2,'0')}</span>
            <span class="item-title">${task.title}</span>
            <span class="page-tag">${task.tag}</span>
          </div>
          <div class="item-desc">${task.desc}</div>
          <div class="done-stamp">✓ Completed</div>
          <span class="note-label">Notes</span>
          <textarea class="note-area" placeholder="Add a note..." onclick="event.stopPropagation()" oninput="saveNote('${task.id}', this.value)">${noteVal}</textarea>
        </div>
        <button class="delete-btn" onclick="deleteTask('${task.id}')" title="Delete task">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/></svg>
        </button>`;
      card.appendChild(item);
    });

    updateProgress();
  }

  // ── ACTIONS ──
  function toggleItem(id) {
    state.checks[id] = !state.checks[id];
    render();
    queueSave();
  }

  function saveNote(id, val) {
    state.notes[id] = val;
    queueSave();
  }

  function deleteTask(id) {
    const task = TASKS.find(t => t.id === id);
    if (!confirm(`Delete task: "${task ? task.title : id}"?\n\nThis cannot be undone.`)) return;
    TASKS = TASKS.filter(t => t.id !== id);
    delete state.checks[id];
    delete state.notes[id];
    render();
    queueSave();
  }

  function updateProgress() {
    const total = TASKS.length;
    const done = TASKS.filter(t => state.checks[t.id]).length;
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' of ' + total + ' complete';
    document.getElementById('summaryText').textContent = done;
    document.getElementById('summaryTotal').textContent = total;
    document.getElementById('allDoneBanner').classList.toggle('show', total > 0 && done === total);
  }

  async function resetAll() {
    if (!confirm('Reset all checkboxes and notes for everyone? This cannot be undone.')) return;
    state.checks = {}; state.notes = {};
    render();
    await saveToCloud();
  }

  // ── INIT ──
  window.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem(PIN_SESSION_KEY) === '1') {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadFromCloud();
    }
    setInterval(() => { if (sessionStorage.getItem(PIN_SESSION_KEY)==='1') loadFromCloud(); }, 30000);
  });
</script>
</body>
</html>
